<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Comment Monitor — 2026-04-28 13:08</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --bg:        #0f0f0f;
    --bg2:       #161616;
    --bg3:       #1e1e1e;
    --border:    #2a2a2a;
    --text:      #e0e0e0;
    --muted:     #666;
    --accent:    #f5a623;
    --new-bg:    #1a1400;
    --new-border:#f5a623;
    --new-badge: #f5a623;
    --link:      #6ab0ff;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    padding: 32px 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 32px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  header .meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  header .meta span { color: var(--text); }

  .summary {
    display: flex;
    gap: 24px;
    margin-top: 16px;
  }

  .stat {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .stat strong {
    display: block;
    font-size: 22px;
    color: var(--text);
    font-weight: 600;
    letter-spacing: 0;
    line-height: 1.2;
  }

  .stat.highlight strong { color: var(--accent); }

  .video-block {
    margin-bottom: 40px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .video-header {
    background: var(--bg2);
    padding: 14px 18px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .video-header a {
    font-weight: 600;
    font-size: 14px;
    color: var(--link);
    text-decoration: none;
  }

  .video-header a:hover { text-decoration: underline; }

  .video-header .count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }

  .comment {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .comment:last-child { border-bottom: none; }

  .comment.is-new {
    background: var(--new-bg);
    border-left: 3px solid var(--new-border);
    padding-left: 15px;
  }

  .comment-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .author {
    font-weight: 500;
    font-size: 13px;
    color: var(--text);
  }

  .ts {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .badge-new {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    background: var(--new-badge);
    color: #000;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .comment-link {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
  }

  .comment-link:hover { color: var(--link); }

  .comment-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.65;
    word-break: break-word;
  }

  .empty {
    text-align: center;
    padding: 80px 20px;
    font-family: var(--mono);
    color: var(--muted);
    font-size: 13px;
  }

  .empty strong { display: block; color: var(--text); font-size: 18px; margin-bottom: 8px; }

  .channel-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 8px 18px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <h1>// YT Comment Monitor</h1>
  <div class="meta">Last run: <span>2026-04-28 13:08</span></div>
  <div class="summary">
    <div class="stat highlight"><strong>0</strong>new comments</div>
    <div class="stat"><strong>0</strong>total fetched</div>
    <div class="stat"><strong>0</strong>videos scanned</div>
    <div class="stat"><strong>2</strong>channels</div>
  </div>
</header>

<div class="empty"><strong>Nothing new.</strong>All comments already seen.</div>

</body>
</html>
